# Security Agent Configuration
agent:
  name: "SecurityAgent"
  version: "1.0.0"
  auto_fix: true
  log_level: "INFO"
  report_format: "txt"  # txt, json, html

# Audit settings
audit:
  enabled_checks:
    - windows_updates
    - firewall_status
    - antivirus_status
    - dns_security
    - webrtc_leaks
    - telemetry
    - open_ports
    - suspicious_processes
    - password_policy
    - disk_encryption
    - browser_security
    - network_shares
    - autostart_items
    - scheduled_tasks
    - permissions
    - registry_security
    - event_logs
    - user_accounts
    - firewall_rules
    - service_configs
  
  severity_weights:
    CRITICAL: 10
    HIGH: 5
    MEDIUM: 2
    LOW: 1

# Fix settings
fix:
  auto_apply: true
  require_confirmation: false
  backup_before_fix: true
  max_retries: 3

# Monitoring
monitor:
  enabled: false
  interval_seconds: 300
  alert_on_critical: true
  web_dashboard: false
  dashboard_port: 5000

# Reporting
reporting:
  save_reports: true
  report_directory: "./reports"
  retention_days: 30
  email_reports: false
  email_recipient: "admin@example.com"

# Advanced Protection Settings
advanced_protection:
  real_time:
    enabled: true
    monitor_directories:
      - "Desktop"
      - "Documents"
      - "Downloads"
    ransomware_threshold: 100  # files modified in 60 seconds
  
  malware_scanning:
    enabled: true
    auto_quarantine: true
    scan_schedule: "weekly"
    yara_rules: "config/malware_rules.yar"
  
  network_monitoring:
    enabled: false  # Enable if scapy installed
    detect_arp_spoofing: true
    detect_port_scan: true
    suspicious_ips_file: "config/suspicious_ips.txt"
  
  vulnerability_scanning:
    enabled: true
    check_cve: true
    cve_database: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  
  behavioral_analysis:
    enabled: true
    use_ml: true
    anomaly_threshold: 0.1

# Threat Logging (Optional)
threat_logging:
  enabled: true
  database: "threats.db"
  log_file: "threat_log.json"
  retention_days: 90
  alert_on_critical: true
  email_alerts:
    enabled: false
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender: "security@example.com"
    recipient: "admin@example.com"
  desktop_notifications: true

# Performance (Optional)
performance:
  max_cpu_percent: 50
  max_memory_mb: 500
  scan_priority: "low"
  background_scan: true

# Quarantine (Optional)
quarantine:
  enabled: true
  directory: "./quarantine"
  retention_days: 30
